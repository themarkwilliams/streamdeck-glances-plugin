name: Feature request
description: Suggest an idea or improvement for Docker Monitor
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before submitting, please check the existing
        issues to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where the plugin falls short today.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds or alternatives you have considered
    validations:
      required: false
